apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorzero-ui
  namespace: gccluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tensorzero-ui
  template:
    metadata:
      labels:
        app: tensorzero-ui
    spec:
      containers:
      - name: ui
        image: tensorzero/ui:latest
        ports:
          - name: http
            containerPort: 4000
        env:
          - name: TENSORZERO_CLICKHOUSE_URL
            value: "http://clickhouse-headless:8123"
          - name: TENSORZERO_GATEWAY_URL
            value: "http://tensorzero-gateway:3000"
          - name: HOME
            value: "/tmp"
          - name: AZURE_OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: OPENAI_API_KEY
        volumeMounts:
          - name: config
            mountPath: /app/config
            readOnly: true

      volumes:
        - name: config
          configMap:
            name: tensorzero-config

---
apiVersion: v1
kind: Service
metadata:
  name: tensorzero-ui
  namespace: gccluster
spec:
  selector:
    app: tensorzero-ui
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP

