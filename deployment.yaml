
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcai-backend
  namespace: gccluster
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gcai-backend
  template:
    metadata:
      labels:
        app: gcai-backend
    spec:
      containers:
      - name: gcai-backend
        image: ghcr.io/hy-global-campus/gcai-backend:main
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: OPENAI_API_KEY
          - name: OPENAI_API_BASE
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: OPENAI_API_BASE
          - name: AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: GCAI_AUTH_TOKEN
          - name: AZURE_SEARCH_KEY
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: AZURE_SEARCH_KEY


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcai-frontend
  namespace: gccluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcai-frontend
  template:
    metadata:
      labels:
        app: gcai-frontend
    spec:
      containers:
      - name: gcai-frontend
        image: ghcr.io/hy-global-campus/gcai-frontend:main
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
          - name: BACKEND_URL
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: BACKEND_URL
          - name: BACKEND_TOKEN
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: GCAI_AUTH_TOKEN
---
