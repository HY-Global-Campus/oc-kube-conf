---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorzero-gateway
  namespace: gccluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tensorzero-gateway
  template:
    metadata:
      labels:
        app: tensorzero-gateway
    spec:
      containers:
      - name: gateway
        image: tensorzero/gateway:latest
        args:
          - "--config-file=/app/config/tensorzero.toml"
        env:
          - name: AZURE_OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: gc-secret
                key: OPENAI_API_KEY
          - name: TENSORZERO_CLICKHOUSE_URL
            value: "http://clickhouse-headless:8123"
        ports:
          - name: http
            containerPort: 3000
        readinessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 15
          timeoutSeconds: 1
          periodSeconds: 15
          failureThreshold: 2
        volumeMounts:
          - name: config
            mountPath: /app/config
            readOnly: true
      volumes:
        - name: config
          configMap:
            name: tensorzero-config
---
apiVersion: v1
kind: Service
metadata:
  name: tensorzero-gateway
  namespace: gccluster
spec:
  selector:
    app: tensorzero-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
